<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #FFF5E6 0%, #FFFACD 50%, #FFE4E1 100%);
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 850px;
            width: 100%;
        }

        h1 {
            color: #F4A460;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 6px rgba(255, 200, 100, 0.4);
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 800px;
            margin: 0 auto 20px auto;
            background: linear-gradient(135deg, rgba(255, 250, 205, 0.7), rgba(255, 228, 225, 0.7));
            padding: 15px;
            border-radius: 15px;
            color: #8B6F47;
            border: 2px solid #FFD700;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }

        .score-section {
            font-size: 1.5em;
        }

        .score-section p {
            margin: 5px 0;
            opacity: 0.9;
            font-weight: bold;
            color: #D4A574;
        }

        .score-section .score {
            font-size: 2em;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 1px 1px 3px rgba(255, 200, 100, 0.3);
        }

        #gameCanvas {
            display: block;
            background-color: #F5F5DC;
            border: 3px solid #FFD700;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
            max-width: 100%;
            height: auto;
            margin: 0 auto;
        }

        .instructions {
            color: #8B6F47;
            margin-top: 20px;
            background: linear-gradient(135deg, rgba(255, 250, 205, 0.8), rgba(255, 228, 225, 0.8));
            padding: 15px;
            border-radius: 15px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            border: 2px solid #FFD700;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }

        .instructions h3 {
            margin-bottom: 10px;
            color: #F4A460;
            font-size: 1.2em;
        }

        .instructions p {
            margin: 5px 0;
            font-size: 0.9em;
            line-height: 1.6;
            color: #8B6F47;
        }

        .button-group {
            margin-top: 15px;
        }

        button {
            background: linear-gradient(135deg, #FFD700, #FFC700);
            color: #8B6F47;
            border: 2px solid #F4A460;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 215, 0, 0.2);
        }

        button:hover {
            background: linear-gradient(135deg, #FFED4E, #FFD700);
            transform: scale(1.08);
            box-shadow: 0 6px 15px rgba(255, 215, 0, 0.4);
        }

        button:active {
            transform: scale(0.95);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }

            .scoreboard {
                font-size: 0.9em;
                padding: 10px;
            }

            .score-section .score {
                font-size: 1.5em;
            }

            .instructions p {
                font-size: 0.8em;
            }

            button {
                padding: 8px 16px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 PONG GAME 🎮</h1>
        
        <div class="scoreboard">
            <div class="score-section">
                <p>PLAYER</p>
                <div class="score" id="playerScore">0</div>
            </div>
            <div class="score-section">
                <p>AI</p>
                <div class="score" id="aiScore">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div class="instructions">
            <h3>How to Play</h3>
            <p>
                <strong>Controls:</strong> Use <strong>Mouse Y Position</strong> or <strong>Arrow Keys (↑/↓)</strong> to move your paddle (left side)<br>
                <strong>Goal:</strong> Bounce the ball past the AI to score points!<br>
                <strong>AI:</strong> Computer controls the right paddle<br>
                <strong>First to 5:</strong> Win the game!
            </p>
            <div class="button-group">
                <button id="startBtn">Start Game</button>
                <button id="resetBtn">Reset Score</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Objects
        const paddleWidth = 10;
        const paddleHeight = 80;
        const ballSize = 8;

        // Player Paddle (Left)
        const player = {
            x: 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 6
        };

        // AI Paddle (Right)
        const ai = {
            x: canvas.width - paddleWidth - 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 4,
            reactionDelay: 0,
            reactionCounter: 0
        };

        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 5,
            dy: 5,
            radius: ballSize
        };

        // Score
        let playerScore = 0;
        let aiScore = 0;
        let gameRunning = false;

        // Input handling
        const keys = {};

        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            
            // Move paddle based on mouse position
            if (mouseY > 0 && mouseY < canvas.height) {
                player.y = mouseY - paddleHeight / 2;
            }
        });

        // Game Functions
        function drawPaddle(paddle) {
            ctx.fillStyle = '#F4A460';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.shadowColor = '#F4A460';
            ctx.shadowBlur = 10;
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.shadowBlur = 0;
        }

        function drawBall() {
            ctx.fillStyle = '#FFB6C1';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowColor = '#FFB6C1';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawCenterLine() {
            ctx.strokeStyle = '#FFD700';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function updatePlayerPaddle() {
            if (keys['ArrowUp'] || keys['w'] || keys['W']) {
                player.y = Math.max(0, player.y - player.speed);
            }
            if (keys['ArrowDown'] || keys['s'] || keys['S']) {
                player.y = Math.min(canvas.height - player.height, player.y + player.speed);
            }
        }

        function updateAIPaddle() {
            // Add subtle reaction delay to make AI beatable but competitive
            ai.reactionCounter++;
            if (ai.reactionCounter >= ai.reactionDelay) {
                ai.reactionCounter = 0;
                ai.reactionDelay = Math.random() * 8 + 2; // Random delay between 2-10 frames
            }

            const aiCenter = ai.y + ai.height / 2;
            const ballCenter = ball.y;

            // Only move if reaction counter is ready
            if (ai.reactionCounter === 0) {
                if (aiCenter < ballCenter - 40) {
                    ai.y = Math.min(canvas.height - ai.height, ai.y + ai.speed);
                } else if (aiCenter > ballCenter + 40) {
                    ai.y = Math.max(0, ai.y - ai.speed);
                }
            }
        }

        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall collision (top and bottom)
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.radius, Math.min(canvas.height - ball.radius, ball.y));
            }

            // Paddle collision (Player)
            if (
                ball.x - ball.radius < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height
            ) {
                ball.dx = -ball.dx;
                ball.x = player.x + player.width + ball.radius;
                
                // Add spin based on where ball hits paddle
                const collidePoint = ball.y - (player.y + player.height / 2);
                ball.dy = collidePoint * 0.1;
                
                // Increase speed
                ball.dx *= 1.05;
            }

            // Paddle collision (AI)
            if (
                ball.x + ball.radius > ai.x &&
                ball.y > ai.y &&
                ball.y < ai.y + ai.height
            ) {
                ball.dx = -ball.dx;
                ball.x = ai.x - ball.radius;
                
                // Add spin based on where ball hits paddle
                const collidePoint = ball.y - (ai.y + ai.height / 2);
                ball.dy = collidePoint * 0.1;
                
                // Increase speed
                ball.dx *= 1.05;
            }

            // Score points
            if (ball.x < 0) {
                aiScore++;
                document.getElementById('aiScore').textContent = aiScore;
                resetBall();
                checkGameOver();
            }
            if (ball.x > canvas.width) {
                playerScore++;
                document.getElementById('playerScore').textContent = playerScore;
                resetBall();
                checkGameOver();
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.dy = (Math.random() - 0.5) * 8;
        }

        function checkGameOver() {
            if (playerScore >= 5) {
                alert('🎉 Player Wins! Final Score: ' + playerScore + ' - ' + aiScore);
                resetGame();
            } else if (aiScore >= 5) {
                alert('💻 AI Wins! Final Score: ' + playerScore + ' - ' + aiScore);
                resetGame();
            }
        }

        function resetGame() {
            playerScore = 0;
            aiScore = 0;
            document.getElementById('playerScore').textContent = '0';
            document.getElementById('aiScore').textContent = '0';
            resetBall();
            gameRunning = false;
            document.getElementById('startBtn').textContent = 'Start Game';
        }

        function draw() {
            ctx.fillStyle = '#F5F5DC';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawCenterLine();
            drawPaddle(player);
            drawPaddle(ai);
            drawBall();
        }

        function update() {
            if (!gameRunning) return;

            updatePlayerPaddle();
            updateAIPaddle();
            updateBall();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Button handlers
        document.getElementById('startBtn').addEventListener('click', () => {
            gameRunning = !gameRunning;
            document.getElementById('startBtn').textContent = gameRunning ? 'Pause Game' : 'Resume Game';
        });

        document.getElementById('resetBtn').addEventListener('click', resetGame);

        // Start the game loop
        gameLoop();
    </script>
</body>
</html>
